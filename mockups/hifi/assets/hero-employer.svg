<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="employerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="400" cy="250" r="280" fill="#4f46e5" opacity="0.07"/>

  <!-- Central magnifying glass concept -->
  <g id="lens">
    <!-- Outer circle -->
    <circle cx="350" cy="250" r="120" fill="none" stroke="#4f46e5" stroke-width="3" opacity="0.9"/>

    <!-- Inner circle with gradient fill -->
    <circle cx="350" cy="250" r="110" fill="#0ea5e9" opacity="0.15"/>

    <!-- Lens shine -->
    <circle cx="320" cy="220" r="35" fill="#0ea5e9" opacity="0.4"/>

    <!-- Handle -->
    <line x1="430" y1="320" x2="520" y2="410" stroke="#4f46e5" stroke-width="4" opacity="0.85"/>
    <circle cx="520" cy="410" r="8" fill="#4f46e5" opacity="0.8"/>
  </g>

  <!-- Profile cards/nodes inside and around lens -->
  <g id="profiles">
    <!-- Card 1 - top left -->
    <rect x="280" y="160" width="50" height="50" rx="3" fill="#10b981" opacity="0.7"/>
    <circle cx="290" cy="175" r="5" fill="#f59e0b" opacity="0.8"/>
    <line x1="295" y1="175" x2="320" y2="175" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6"/>

    <!-- Card 2 - right -->
    <rect x="440" y="230" width="50" height="50" rx="3" fill="#0ea5e9" opacity="0.65"/>
    <circle cx="450" cy="245" r="5" fill="#f59e0b" opacity="0.75"/>
    <line x1="455" y1="245" x2="480" y2="245" stroke="#4f46e5" stroke-width="1.5" opacity="0.5"/>

    <!-- Card 3 - bottom -->
    <rect x="300" y="340" width="50" height="50" rx="3" fill="#4f46e5" opacity="0.75"/>
    <circle cx="310" cy="355" r="5" fill="#10b981" opacity="0.8"/>
    <line x1="315" y1="355" x2="340" y2="355" stroke="#0ea5e9" stroke-width="1.5" opacity="0.55"/>

    <!-- Card 4 - top right -->
    <rect x="500" y="170" width="50" height="50" rx="3" fill="#10b981" opacity="0.65"/>
    <circle cx="510" cy="185" r="5" fill="#f59e0b" opacity="0.7"/>
    <line x1="515" y1="185" x2="540" y2="185" stroke="#0ea5e9" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Talent network connections -->
  <g id="connections" opacity="0.6">
    <line x1="350" y1="250" x2="305" y2="185" stroke="#0ea5e9" stroke-width="2" opacity="0.5"/>
    <line x1="350" y1="250" x2="465" y2="255" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="350" y1="250" x2="325" y2="365" stroke="#0ea5e9" stroke-width="1.5" opacity="0.45"/>
    <line x1="350" y1="250" x2="525" y2="195" stroke="#4f46e5" stroke-width="1.5" opacity="0.4"/>
    <line x1="465" y1="255" x2="525" y2="195" stroke="#10b981" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- Verification checkmarks -->
  <g id="verification" opacity="0.8">
    <!-- Checkmark 1 -->
    <g transform="translate(270, 320)">
      <circle cx="0" cy="0" r="12" fill="#10b981" opacity="0.5"/>
      <path d="M -5 0 L -1 4 L 5 -3" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Checkmark 2 -->
    <g transform="translate(560, 290)">
      <circle cx="0" cy="0" r="12" fill="#10b981" opacity="0.6"/>
      <path d="M -5 0 L -1 4 L 5 -3" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Checkmark 3 -->
    <g transform="translate(620, 240)">
      <circle cx="0" cy="0" r="10" fill="#10b981" opacity="0.4"/>
      <path d="M -4 0 L -1 3 L 4 -2" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Abstract network nodes on left -->
  <g id="sideNetwork" opacity="0.7">
    <circle cx="100" cy="120" r="4" fill="#4f46e5" opacity="0.6"/>
    <circle cx="130" cy="150" r="3" fill="#0ea5e9" opacity="0.5"/>
    <line x1="100" y1="120" x2="130" y2="150" stroke="#4f46e5" stroke-width="1.5" opacity="0.3"/>

    <circle cx="80" cy="300" r="5" fill="#10b981" opacity="0.5"/>
    <circle cx="120" cy="330" r="4" fill="#f59e0b" opacity="0.6"/>
    <line x1="80" y1="300" x2="120" y2="330" stroke="#10b981" stroke-width="1.5" opacity="0.35"/>

    <circle cx="110" cy="420" r="3" fill="#0ea5e9" opacity="0.4"/>
  </g>

  <!-- Right side decorative elements -->
  <g id="rightDecor" opacity="0.75">
    <polygon points="650,100 680,120 660,150" fill="#10b981" opacity="0.4"/>
    <rect x="700" y="300" width="30" height="30" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.5"/>
    <circle cx="680" cy="400" r="6" fill="#f59e0b" opacity="0.5"/>
  </g>
</svg>
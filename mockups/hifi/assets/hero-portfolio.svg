<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="portfolioGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="400" cy="250" r="300" fill="#4f46e5" opacity="0.07"/>

  <!-- 3D Browser/Screen frame - main element -->
  <g id="browserFrame" transform="translate(150, 80) skewY(-5)" filter="url(#shadow)">
    <!-- Frame top bar -->
    <rect x="0" y="0" width="400" height="35" rx="6" fill="#4f46e5" opacity="0.9"/>
    <circle cx="15" cy="17" r="3" fill="#f59e0b" opacity="0.8"/>
    <circle cx="30" cy="17" r="3" fill="#0ea5e9" opacity="0.7"/>
    <circle cx="45" cy="17" r="3" fill="#4f46e5" opacity="0.6"/>

    <!-- Main browser content area -->
    <rect x="0" y="35" width="400" height="280" fill="#0ea5e9" opacity="0.1" stroke="#4f46e5" stroke-width="2"/>

    <!-- Project cards inside -->
    <!-- Card 1 -->
    <rect x="15" y="55" width="85" height="70" rx="3" fill="#4f46e5" opacity="0.7"/>
    <rect x="15" y="55" width="85" height="4" fill="#f59e0b" opacity="0.7"/>
    <rect x="20" y="65" width="75" height="3" fill="#0ea5e9" opacity="0.5"/>

    <!-- Card 2 -->
    <rect x="115" y="55" width="85" height="70" rx="3" fill="#0ea5e9" opacity="0.65"/>
    <rect x="115" y="55" width="85" height="4" fill="#f59e0b" opacity="0.65"/>
    <rect x="120" y="65" width="75" height="3" fill="#4f46e5" opacity="0.45"/>

    <!-- Card 3 -->
    <rect x="215" y="55" width="85" height="70" rx="3" fill="#4f46e5" opacity="0.75"/>
    <rect x="215" y="55" width="85" height="4" fill="#0ea5e9" opacity="0.6"/>
    <rect x="220" y="65" width="75" height="3" fill="#f59e0b" opacity="0.4"/>

    <!-- Card 4 -->
    <rect x="315" y="55" width="85" height="70" rx="3" fill="#0ea5e9" opacity="0.7"/>
    <rect x="315" y="55" width="85" height="4" fill="#4f46e5" opacity="0.65"/>
    <rect x="320" y="65" width="75" height="3" fill="#f59e0b" opacity="0.45"/>

    <!-- Skill bars -->
    <text x="20" y="150" font-size="10" fill="#4f46e5" opacity="0.6">Skills</text>
    <rect x="20" y="160" width="180" height="6" rx="3" fill="#4f46e5" opacity="0.2"/>
    <rect x="20" y="160" width="140" height="6" rx="3" fill="#4f46e5" opacity="0.75"/>

    <rect x="20" y="175" width="180" height="6" rx="3" fill="#0ea5e9" opacity="0.2"/>
    <rect x="20" y="175" width="155" height="6" rx="3" fill="#0ea5e9" opacity="0.7"/>

    <rect x="20" y="190" width="180" height="6" rx="3" fill="#f59e0b" opacity="0.2"/>
    <rect x="20" y="190" width="125" height="6" rx="3" fill="#f59e0b" opacity="0.65"/>

    <!-- Verification badge -->
    <g transform="translate(280, 150)">
      <circle cx="0" cy="0" r="22" fill="#0ea5e9" opacity="0.8"/>
      <circle cx="0" cy="0" r="22" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.7"/>
      <path d="M -8 0 L -3 5 L 8 -4" stroke="#4f46e5" stroke-width="2.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    </g>
  </g>

  <!-- Code brackets decorations - left side of frame -->
  <g id="codeBrackets" opacity="0.75">
    <!-- Opening bracket -->
    <path d="M 110 140 L 95 140 L 95 260 L 110 260" stroke="#4f46e5" stroke-width="2.5" fill="none"
          stroke-linecap="round" opacity="0.8"/>

    <!-- Closing bracket -->
    <path d="M 580 140 L 595 140 L 595 260 L 580 260" stroke="#0ea5e9" stroke-width="2.5" fill="none"
          stroke-linecap="round" opacity="0.75"/>
  </g>

  <!-- 3D depth elements - right side -->
  <g id="depthElements" opacity="0.7">
    <!-- Shadow/3D effect base -->
    <path d="M 560 370 L 570 355 L 570 85 L 560 100 Z" fill="#4f46e5" opacity="0.15"/>

    <!-- Additional 3D plane -->
    <polygon points="560,370 600,350 600,80 560,100" fill="#0ea5e9" opacity="0.12"/>
  </g>

  <!-- Floating accent elements -->
  <g id="floatingAccents" opacity="0.8">
    <!-- Top right accent -->
    <circle cx="650" cy="60" r="6" fill="#f59e0b" opacity="0.65"/>
    <circle cx="670" cy="80" r="4" fill="#0ea5e9" opacity="0.5"/>
    <line x1="650" y1="60" x2="670" y2="80" stroke="#4f46e5" stroke-width="1.5" opacity="0.4"/>

    <!-- Bottom left accent -->
    <polygon points="80,420 105,435 95,460" fill="#0ea5e9" opacity="0.35"/>
    <circle cx="50" cy="450" r="5" fill="#4f46e5" opacity="0.5"/>

    <!-- Bottom right accent -->
    <rect x="700" y="380" width="35" height="35" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.5"/>
    <circle cx="740" cy="440" r="6" fill="#f59e0b" opacity="0.55"/>
  </g>

  <!-- Top left accent - geometric shapes -->
  <g id="topLeftGeometric" opacity="0.65">
    <polygon points="40,50 65,65 50,90" fill="#4f46e5" opacity="0.4"/>
    <circle cx="100" cy="40" r="4" fill="#f59e0b" opacity="0.5"/>
  </g>
</svg>
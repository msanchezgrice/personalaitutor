<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social - AI Tutor Workspace</title>
  <link rel="stylesheet" href="/assets/styles-v3.css">
</head>
<body>
  <div class="split">
    <aside class="sidebar">
      <div class="brand">AI Tutor</div>
      <ul class="side-links">
        <li><a href="/dashboard/">Dashboard</a></li>
        <li><a href="/dashboard/projects/">Projects</a></li>
        <li><a href="/dashboard/profile/">Profile</a></li>
        <li><a href="/dashboard/chat/">AI Tutor Chat</a></li>
        <li><a href="/dashboard/social/" class="active">Social</a></li>
        <li><a href="/dashboard/updates/">Updates</a></li>
      </ul>
    </aside>

    <div class="content">
      <header class="topbar">
        <div class="topbar-inner">
          <nav class="nav">
            <a href="/" class="nav-link">Home</a>
            <a href="/assessment/" class="nav-link">Assessment</a>
            <a href="/dashboard/" class="nav-link">Dashboard</a>
            <a href="/employers/" class="nav-link">For Employers</a>
          </nav>
          <div class="topbar-cta">
            <a href="/assessment/" class="btn primary">Get Started</a>
          </div>
        </div>
      </header>

      <main class="main-panel">
        <div class="container">
          <h1>Social Composer</h1>

          <div class="grid-2">
            <div class="panel pad">
              <h3>Generate Draft</h3>

              <div class="form-group">
                <label class="form-label">Project</label>
                <select class="form-input">
                  <option>Select a project...</option>
                  <option>Customer Support Copilot</option>
                  <option>AI Sales Follow-up Bot</option>
                  <option>Recruiting Outreach Engine</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Audience</label>
                <select class="form-input">
                  <option>Developers</option>
                  <option>Product Managers</option>
                  <option>Business Leaders</option>
                  <option>AI Researchers</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Platform</label>
                <select class="form-input">
                  <option>Twitter/X</option>
                  <option>LinkedIn</option>
                  <option>Bluesky</option>
                  <option>Thread</option>
                </select>
              </div>

              <button class="btn primary" style="width: 100%; margin-top: 8px;">Generate Draft</button>

              <div style="margin-top: 16px; padding: 12px; background-color: var(--surface-muted); border-radius: var(--radius-sm); border: 1px solid var(--line);">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 0.9rem;">
                  <input type="checkbox" id="sim-fail-token" data-sim-fail-token />
                  <label for="sim-fail-token">Simulate token limit error</label>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem;">
                  <input type="checkbox" id="sim-fail-rate" data-sim-fail-rate />
                  <label for="sim-fail-rate">Simulate rate limit error</label>
                </div>
              </div>
            </div>

            <div class="panel pad">
              <h3>Preview</h3>
              <div style="border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden;">
                <div style="width: 100%; height: 140px; background: linear-gradient(135deg, var(--brand-subtle), #e0e7ff); display: flex; align-items: center; justify-content: center; color: var(--brand); font-weight: 600; font-size: 0.9rem;">Preview Image</div>
                <div style="padding: 12px;">
                  <div style="font-size: 0.9rem; font-weight: 600; color: var(--ink); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" data-og-title>Project Title</div>
                  <div style="font-size: 0.8rem; color: var(--ink-soft); line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;" data-og-desc>Project description and key features.</div>
                  <div style="font-size: 0.75rem; color: var(--brand-2);" data-og-url>personalai.io/project</div>
                </div>
              </div>
            </div>
          </div>

          <div class="panel pad">
            <h3>Draft Content</h3>

            <textarea class="form-textarea" data-draft-text placeholder="Your generated draft will appear here..." style="min-height: 150px;"></textarea>

            <div style="display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap;">
              <button class="btn primary" data-publish-api>Publish to API</button>
              <button class="btn ghost" data-publish-composer>Open in Composer</button>
              <button class="btn ghost" data-copy-draft>Copy Draft</button>
              <button class="btn alert">Clear</button>
            </div>

            <div data-social-output></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const draftText = document.querySelector('[data-draft-text]');
      const publishApiBtn = document.querySelector('[data-publish-api]');
      const publishComposerBtn = document.querySelector('[data-publish-composer]');
      const copyDraftBtn = document.querySelector('[data-copy-draft]');
      const outputArea = document.querySelector('[data-social-output]');

      const sampleDraft = `Just shipped v2 of our AI Sales Follow-up Bot! 🚀

Key improvements:
• 40% faster response generation
• Better personalization with company context
• Real-time performance metrics dashboard

Building production LLM systems requires obsessing over latency, quality, and reliability. Every millisecond matters when you're generating outbound comms at scale.

Try it: [link]

#AI #LLM #ProductDevelopment`;

      draftText.value = sampleDraft;

      document.querySelector('[data-og-title]').textContent = 'AI Sales Follow-up Bot v2 Released';
      document.querySelector('[data-og-desc]').textContent = 'Introducing faster, smarter outbound generation with real-time performance metrics.';
      document.querySelector('[data-og-url]').textContent = 'personalai.io/projects/sales-bot';

      publishApiBtn.addEventListener('click', function() {
        const simFailToken = document.querySelector('[data-sim-fail-token]').checked;
        const simFailRate = document.querySelector('[data-sim-fail-rate]').checked;

        if (simFailToken) {
          outputArea.innerHTML = '<div class="fail-box" style="margin-top: 16px;">Error: Token limit exceeded. Draft is 547 tokens, max 512. Please shorten and try again.</div>';
          return;
        }

        if (simFailRate) {
          outputArea.innerHTML = '<div class="fail-box" style="margin-top: 16px;">Error: Rate limit exceeded. Please wait 60 seconds before publishing again.</div>';
          return;
        }

        outputArea.innerHTML = '<div class="success-box" style="margin-top: 16px;">Draft published successfully! Post live at @alexchen_ai on Twitter.</div>';
      });

      publishComposerBtn.addEventListener('click', function() {
        outputArea.innerHTML = '<div class="success-box" style="margin-top: 16px;">Opening in native platform composer...</div>';
      });

      copyDraftBtn.addEventListener('click', function() {
        navigator.clipboard.writeText(draftText.value);
        outputArea.innerHTML = '<div class="success-box" style="margin-top: 16px;">Draft copied to clipboard!</div>';
      });
    });
  </script>
  <script src="/assets/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding | AI Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="relative min-h-screen bg-[var(--bg-dark)] text-[var(--text-main)] flex items-center justify-center py-10 px-4 md:px-6 overflow-x-hidden">
    <div class="fixed top-4 right-4 z-[100]">
        <button id="theme-toggle"
            class="btn bg-white/10 hover:bg-white/20 text-white border border-white/10 px-3 py-2 rounded-lg flex items-center justify-center transition-colors">
            <i class="fa-solid fa-sun" id="theme-icon"></i>
        </button>
    </div>

    <div class="bg-glow top-0 right-0 transform translate-x-1/3 -translate-y-1/3 opacity-40"></div>
    <div class="bg-glow bottom-0 left-0 transform -translate-x-1/3 translate-y-1/3 opacity-30"
        style="background: radial-gradient(circle, var(--secondary-glow) 0%, rgba(0,0,0,0) 70%);"></div>

    <div class="container max-w-4xl grid md:grid-cols-2 gap-8 items-center">

        <!-- Left: Welcome Text -->
        <div class="hidden md:block">
            <div
                class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-white font-bold text-2xl mb-6">
                <i class="fa-solid fa-brain"></i>
            </div>
            <h1 class="text-5xl font-[Outfit] mb-6 leading-tight text-[var(--text-main)]">Your AI-Native <br><span class="text-gradient">Career
                    Starts Here.</span></h1>
            <ul class="space-y-4 text-[var(--text-muted)]">
                <li class="flex items-center gap-3">
                    <i class="fa-solid fa-check text-emerald-400"></i> Personalized curriculum built instantly
                </li>
                <li class="flex items-center gap-3">
                    <i class="fa-solid fa-check text-emerald-400"></i> Dedicated 24/7 AI Tutor assistant
                </li>
                <li class="flex items-center gap-3">
                    <i class="fa-solid fa-check text-emerald-400"></i> Public proof generation
                </li>
            </ul>
        </div>

        <!-- Right: Authentication & Resume Upload Card -->
        <div class="glass-panel p-8 w-full max-w-md mx-auto">
            <div class="text-center mb-8 md:hidden">
                <div
                    class="inline-flex w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 items-center justify-center text-white font-bold text-2xl mb-4">
                    <i class="fa-solid fa-brain"></i>
                </div>
                <h2 class="text-2xl font-[Outfit]">Create Account</h2>
            </div>

            <!-- Quick Upload Section -->
            <div class="mb-8">
            <h3 class="text-[var(--text-main)] font-medium mb-4 text-sm uppercase tracking-wider text-center">Fast-track setup
                </h3>
                <div
                    class="border-2 border-dashed border-white/20 rounded-xl p-8 hover:bg-white/5 hover:border-emerald-500/50 transition-all cursor-pointer text-center group">
                    <div
                        class="w-16 h-16 rounded-full bg-emerald-500/10 flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-file-arrow-up text-2xl text-emerald-400"></i>
                    </div>
                    <p class="text-[var(--text-main)] font-medium mb-1">Upload Resume (PDF)</p>
                    <p class="text-xs text-gray-500">We'll parse your experience to tailor your tutor.</p>
                </div>
            </div>

            <div class="flex items-center gap-4 mb-8">
                <div class="h-px bg-white/10 flex-grow"></div>
                <span class="text-xs text-gray-500 uppercase tracking-widest font-semibold">Or</span>
                <div class="h-px bg-white/10 flex-grow"></div>
            </div>

            <!-- Social Logins -->
            <div class="space-y-3">
                <label class="block text-xs uppercase tracking-wider text-gray-500 font-semibold">Current Situation</label>
                <select id="onboarding-situation" class="w-full p-3 rounded-lg border border-white/10 bg-white/5 text-[var(--text-main)]">
                    <option value="employed">Employed</option>
                    <option value="unemployed">Unemployed</option>
                    <option value="student">Student</option>
                    <option value="founder">Founder</option>
                    <option value="freelancer">Freelancer</option>
                    <option value="career_switcher">Career Switcher</option>
                </select>
            </div>

            <div class="space-y-3 mt-4">
                <label class="block text-xs uppercase tracking-wider text-gray-500 font-semibold">Career Path</label>
                <select id="onboarding-career-path" class="w-full p-3 rounded-lg border border-white/10 bg-white/5 text-[var(--text-main)]"></select>
            </div>

            <div class="space-y-3 mt-4">
                <label class="block text-xs uppercase tracking-wider text-gray-500 font-semibold">LinkedIn URL</label>
                <input id="onboarding-linkedin-url" type="url" placeholder="https://linkedin.com/in/your-name" class="w-full p-3 rounded-lg border border-white/10 bg-white/5 text-[var(--text-main)] placeholder-gray-500" />
            </div>

            <div class="space-y-3 mt-4">
                <label class="block text-xs uppercase tracking-wider text-gray-500 font-semibold">Primary Goals</label>
                <label class="flex items-center gap-2 text-sm text-[var(--text-main)]"><input type="checkbox" name="onboarding-goal" value="build_business"> Build a business</label>
                <label class="flex items-center gap-2 text-sm text-[var(--text-main)]"><input type="checkbox" name="onboarding-goal" value="upskill_current_job" checked> Upskill for current job</label>
                <label class="flex items-center gap-2 text-sm text-[var(--text-main)]"><input type="checkbox" name="onboarding-goal" value="showcase_for_job"> Showcase skills for a new role</label>
                <label class="flex items-center gap-2 text-sm text-[var(--text-main)]"><input type="checkbox" name="onboarding-goal" value="ship_ai_projects"> Ship AI projects</label>
                <label class="flex items-center gap-2 text-sm text-[var(--text-main)]"><input type="checkbox" name="onboarding-goal" value="learn_foundations"> Learn foundations</label>
            </div>

            <div class="space-y-3 mt-4">
                <label class="block text-xs uppercase tracking-wider text-gray-500 font-semibold">How comfortable are you with AI tools today?</label>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" data-ai-score="2" class="onboarding-score btn btn-secondary py-2">Beginner</button>
                    <button type="button" data-ai-score="3" class="onboarding-score btn btn-secondary py-2">Intermediate</button>
                    <button type="button" data-ai-score="5" class="onboarding-score btn btn-secondary py-2">Advanced</button>
                </div>
            </div>

            <button type="button" id="onboarding-start-assessment" class="w-full btn btn-primary mt-5 py-3">Start Assessment <i class="fa-solid fa-arrow-right ml-2 text-xs"></i></button>
        </div>
    </div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    
    // Check local storage for theme
    const currentTheme = localStorage.getItem('theme') || 'dark';
    if (currentTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      themeIcon.classList.replace('fa-sun', 'fa-moon');
      if (themeToggle) {
        themeToggle.classList.replace('text-white', 'text-gray-800');
        themeToggle.classList.replace('border-white/10', 'border-gray-300');
      }
    }
    
    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        if (theme === 'light') {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'dark');
          themeIcon.classList.replace('fa-moon', 'fa-sun');
          themeToggle.classList.replace('text-gray-800', 'text-white');
          themeToggle.classList.replace('border-gray-300', 'border-white/10');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem('theme', 'light');
          themeIcon.classList.replace('fa-sun', 'fa-moon');
          themeToggle.classList.replace('text-white', 'text-gray-800');
          themeToggle.classList.replace('border-white/10', 'border-gray-300');
        }
      });
    }
  });
</script>

</body>

</html>

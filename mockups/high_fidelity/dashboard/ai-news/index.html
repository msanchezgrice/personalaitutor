<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News | AI Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-[#0f111a] text-white lg:flex lg:h-screen lg:overflow-hidden min-h-screen text-sm">
    <!-- Sidebar setup with AI News active -->
    <aside
        class="w-full lg:w-72 glass border-y-0 border-l-0 rounded-none flex flex-col lg:h-full bg-black/20 flex-shrink-0 z-20 relative">
        <div class="p-6">
            <a href="/" class="flex items-center gap-2 mb-8">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-white font-bold text-xl">
                    <i class="fa-solid fa-brain text-sm"></i>
                </div>
                <span class="font-[Outfit] font-bold text-lg tracking-tight text-white">My AI Skill Tutor</span>
            </a>

            <a href="/dashboard/profile/"
                class="flex items-center gap-3 p-3 rounded-lg hover:bg-white/5 transition border border-transparent hover:border-white/10 mb-8 cursor-pointer">
                <img src="/assets/avatar.png" class="w-10 h-10 rounded-full object-cover border border-white/20"
                    alt="Alex Chen">
                <div class="overflow-hidden">
                    <div class="font-medium text-white truncate">Alex Chen</div>
                    <div class="text-xs text-emerald-400 truncate">Product Manager</div>
                </div>
            </a>

            <nav class="space-y-1">
                <a href="/dashboard/"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition group">
                    <i class="fa-solid fa-house w-5 text-center group-hover:text-emerald-400 transition-colors"></i> Home
                </a>
                <a href="/dashboard/chat/"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition group">
                    <i class="fa-solid fa-message w-5 text-center group-hover:text-amber-400 transition-colors"></i>
                    Chat Tutor
                </a>
                <a href="/dashboard/projects/"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition group">
                    <i class="fa-solid fa-folder-open w-5 text-center group-hover:text-amber-400 transition-colors"></i>
                    Projects
                </a>
                <a href="/dashboard/social/"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition group">
                    <i class="fa-brands fa-linkedin w-5 text-center group-hover:text-[#0077b5] transition-colors"></i>
                    Social Media
                </a>
                <a href="/dashboard/ai-news/"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-lg bg-sky-500/20 text-sky-400 border border-sky-500/30">
                    <i
                        class="fa-solid fa-newspaper w-5 text-center font-bold drop-shadow-[0_0_8px_rgba(56,189,248,0.55)]"></i>
                    AI News
                </a>
                <a href="/dashboard/updates/"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition group flex justify-between">
                    <div class="flex items-center gap-3">
                        <i
                            class="fa-solid fa-clock-rotate-left w-5 text-center group-hover:text-coral-400 transition-colors"></i>
                        <span>Activity</span>
                    </div>
                    <span
                        class="bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded shadow-[0_0_10px_rgba(239,68,68,0.5)]">2</span>
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col lg:h-full relative overflow-y-auto w-full min-w-0">
        <div class="absolute top-0 right-1/4 w-[400px] h-[300px] bg-sky-500/10 blur-[120px] pointer-events-none">
        </div>

        <header
            class="h-20 flex items-center justify-between px-4 md:px-8 lg:px-10 border-b border-white/5 sticky top-0 bg-[#0f111a]/80 backdrop-blur-xl z-10 flex-shrink-0">
            <div>
                <h1 class="text-xl font-[Outfit] font-semibold flex items-center gap-3"><i
                        class="fa-solid fa-newspaper text-sky-400"></i> AI News</h1>
            </div>
        <div class="fixed top-4 right-4 z-[100]">
<button id="theme-toggle" class="btn bg-white/10 hover:bg-white/20 text-white border border-white/10 px-3 py-2 rounded-lg flex items-center justify-center transition-colors">
  <i class="fa-solid fa-sun" id="theme-icon"></i>
</button>
</div>
</header>

        <div class="p-10 max-w-4xl mx-auto w-full pb-24 space-y-4">
            <div class="glass p-5 rounded-xl border border-sky-500/20 bg-sky-500/5 text-slate-100">
                <p class="text-sm">Loading personalized AI news feed...</p>
            </div>

        </div>
    </main>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    
    // Check local storage for theme
    const currentTheme = localStorage.getItem('theme') || 'dark';
    if (currentTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      themeIcon.classList.replace('fa-sun', 'fa-moon');
      if (themeToggle) {
        themeToggle.classList.replace('text-white', 'text-gray-800');
        themeToggle.classList.replace('border-white/10', 'border-gray-300');
      }
    }
    
    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        if (theme === 'light') {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'dark');
          themeIcon.classList.replace('fa-moon', 'fa-sun');
          themeToggle.classList.replace('text-gray-800', 'text-white');
          themeToggle.classList.replace('border-gray-300', 'border-white/10');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem('theme', 'light');
          themeIcon.classList.replace('fa-sun', 'fa-moon');
          themeToggle.classList.replace('text-white', 'text-gray-800');
          themeToggle.classList.replace('border-white/10', 'border-gray-300');
        }
      });
    }
  });
</script>

</body>

</html>

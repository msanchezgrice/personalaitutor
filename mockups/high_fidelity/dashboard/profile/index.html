<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings | AI Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-[#0f111a] text-white lg:flex lg:h-screen lg:overflow-hidden min-h-screen text-sm">
    <!-- Sidebar setup exactly identical to projects but active link on profile... omit for brevity to match style -->
    <aside
        class="w-full lg:w-72 glass border-y-0 border-l-0 rounded-none flex flex-col lg:h-full bg-black/20 flex-shrink-0 z-20 relative">
        <div class="p-6">
            <a href="/" class="flex items-center gap-2 mb-8">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-white font-bold text-xl">
                    <i class="fa-solid fa-brain text-sm"></i>
                </div>
                <span class="font-[Outfit] font-bold text-lg tracking-tight text-white">My AI Skill Tutor</span>
            </a>

            <a href="/dashboard/profile/"
                class="flex items-center gap-3 p-3 rounded-lg border border-white/20 bg-white/5 mb-8 cursor-pointer shadow-[0_0_15px_rgba(255,255,255,0.05)]">
                <img src="/assets/avatar.png" class="w-10 h-10 rounded-full object-cover border border-emerald-500"
                    alt="Alex Chen">
                <div class="overflow-hidden">
                    <div class="font-medium text-white truncate">Alex Chen</div>
                    <div class="text-xs text-emerald-400 truncate">Product Manager</div>
                </div>
            </a>

            <!-- nav -->
            <nav class="space-y-1">
                <a href="/dashboard/"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition group">
                    <i class="fa-solid fa-house w-5 text-center group-hover:text-emerald-400 transition-colors"></i> Home
                </a>
                <a href="/dashboard/chat/"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition group">
                    <i class="fa-solid fa-message w-5 text-center group-hover:text-amber-400 transition-colors"></i>
                    Chat Tutor
                </a>
                <a href="/dashboard/projects/"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition group">
                    <i class="fa-solid fa-folder-open w-5 text-center group-hover:text-amber-400 transition-colors"></i>
                    Projects
                </a>
                <a href="/dashboard/social/"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition group">
                    <i class="fa-brands fa-linkedin w-5 text-center group-hover:text-[#0077b5] transition-colors"></i>
                    Social Hooks
                </a>
                <a href="/dashboard/updates/"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition group">
                    <i class="fa-solid fa-bell w-5 text-center group-hover:text-coral-400 transition-colors"></i>
                    Updates
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main Content Areas -->
    <main class="flex-1 flex flex-col lg:h-full relative overflow-y-auto w-full min-w-0">
        <header
            class="h-20 flex items-center justify-between px-4 md:px-8 lg:px-10 border-b border-white/5 sticky top-0 bg-[#0f111a]/80 backdrop-blur-xl z-10 flex-shrink-0">
            <div>
                <h1 class="text-xl font-[Outfit] font-semibold flex items-center gap-3"><i
                        class="fa-solid fa-user text-emerald-400"></i> Profile Settings</h1>
            </div>
            <div>
                <a href="/u/alex-chen-ai/" class="btn btn-primary text-xs px-4 py-2"><i
                        class="fa-solid fa-globe mr-1"></i> View Public Profile</a>
            </div>
        <div class="fixed top-4 right-4 z-[100]">
<button id="theme-toggle" class="btn bg-white/10 hover:bg-white/20 text-white border border-white/10 px-3 py-2 rounded-lg flex items-center justify-center transition-colors">
  <i class="fa-solid fa-sun" id="theme-icon"></i>
</button>
</div>
</header>

        <div class="p-10 max-w-3xl mx-auto w-full pb-24 space-y-8">

            <div class="glass p-8 w-full rounded-2xl">
                <h2 class="text-white font-[Outfit] text-lg mb-6 border-b border-white/10 pb-2">Basic Information</h2>

                <div class="flex items-center gap-6 mb-8">
                    <div class="relative group cursor-pointer inline-block">
                        <img src="/assets/avatar.png"
                            class="w-24 h-24 rounded-full object-cover border-4 border-black box-content shadow-[0_0_20px_rgba(79,70,229,0.3)]">
                        <div
                            class="absolute inset-0 bg-black/60 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition border-4 border-emerald-500">
                            <i class="fa-solid fa-camera text-xl text-white"></i>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-white text-lg font-medium">Alex Chen</h3>
                        <p class="text-sm text-gray-400 text-emerald-400 mb-2">alex@example.com</p>
                        <button class="btn btn-secondary text-xs px-3 py-1.5 rounded">Change Avatar</button>
                    </div>
                </div>

                <form class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1 uppercase tracking-wider">Full
                                Name</label>
                            <input type="text"
                                class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 transition"
                                value="Alex Chen">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1 uppercase tracking-wider">Current
                                Role</label>
                            <input type="text"
                                class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 transition"
                                value="Product Manager">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1 uppercase tracking-wider">Public
                            Bio</label>
                        <textarea
                            class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 transition resize-none custom-scrollbar"
                            rows="4">I'm a PM learning how to automate workflows and build prototypes using AI. Building publicly to track my journey from non-technical to AI-fluent.</textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1 uppercase tracking-wider">LinkedIn
                            URL</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-brands fa-linkedin text-gray-500"></i>
                            </div>
                            <input type="text"
                                class="w-full bg-black/40 border border-white/10 rounded-lg pl-10 pr-4 py-2 text-white focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 transition"
                                value="https://linkedin.com/in/alex-chen">
                        </div>
                    </div>

                    <div class="pt-4 mt-4 border-t border-white/10 flex justify-end">
                        <button type="button" class="btn btn-primary px-6 py-2">Save Changes</button>
                    </div>
                </form>
            </div>

        </div>
    </main>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    
    // Check local storage for theme
    const currentTheme = localStorage.getItem('theme') || 'dark';
    if (currentTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      themeIcon.classList.replace('fa-sun', 'fa-moon');
      if (themeToggle) {
        themeToggle.classList.replace('text-white', 'text-gray-800');
        themeToggle.classList.replace('border-white/10', 'border-gray-300');
      }
    }
    
    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        if (theme === 'light') {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'dark');
          themeIcon.classList.replace('fa-moon', 'fa-sun');
          themeToggle.classList.replace('text-gray-800', 'text-white');
          themeToggle.classList.replace('border-gray-300', 'border-white/10');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem('theme', 'light');
          themeIcon.classList.replace('fa-sun', 'fa-moon');
          themeToggle.classList.replace('text-white', 'text-gray-800');
          themeToggle.classList.replace('border-white/10', 'border-gray-300');
        }
      });
    }
  });
</script>

</body>

</html>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    
    // Check local storage for theme
    const currentTheme = localStorage.getItem('theme') || 'dark';
    if (currentTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      themeIcon.classList.replace('fa-sun', 'fa-moon');
      if (themeToggle) {
        themeToggle.classList.replace('text-white', 'text-gray-800');
        themeToggle.classList.replace('border-white/10', 'border-gray-300');
      }
    }
    
    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        if (theme === 'light') {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'dark');
          themeIcon.classList.replace('fa-moon', 'fa-sun');
          themeToggle.classList.replace('text-gray-800', 'text-white');
          themeToggle.classList.replace('border-gray-300', 'border-white/10');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem('theme', 'light');
          themeIcon.classList.replace('fa-sun', 'fa-moon');
          themeToggle.classList.replace('text-white', 'text-gray-800');
          themeToggle.classList.replace('border-white/10', 'border-gray-300');
        }
      });
    }
  });
</script>

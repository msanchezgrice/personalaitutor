<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Assessment | AI Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="relative min-h-screen flex flex-col justify-center items-center py-12">
    <!-- Background Glows -->
    <div class="bg-glow top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 mt-0 ml-0 opacity-30"></div>

    <div class="container max-w-3xl">
        <div class="text-center mb-10">
            <a href="/" class="inline-flex items-center gap-2 mb-6">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl">
                    <i class="fa-solid fa-brain"></i>
                </div>
                <span class="font-[Outfit] font-bold text-xl tracking-tight text-white">AI Tutor</span>
            </a>
            <h1 class="text-4xl mb-4">Let's find your baseline</h1>
            <p class="text-gray-400">Answer a few questions so your AI Tutor can build a personalized curriculum.</p>
        </div>

        <!-- Assessment Card -->
        <div class="glass-panel p-8 md:p-12 relative overflow-hidden">
            <!-- Progress Bar -->
            <div class="w-full bg-white/10 h-1.5 rounded-full mb-8 absolute top-0 left-0">
                <div
                    class="bg-gradient-to-r from-indigo-500 to-cyan-400 w-1/4 h-full rounded-full shadow-[0_0_10px_rgba(79,70,229,0.5)]">
                </div>
            </div>

            <div class="mb-8">
                <span class="text-indigo-400 text-sm font-semibold tracking-wider uppercase">Question 1 of 4</span>
                <h2 class="text-2xl mt-2 mb-6 text-white font-[Outfit]">What is your primary goal with AI?</h2>

                <div class="space-y-4">
                    <!-- Option 1 -->
                    <label
                        class="group flex items-center p-4 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 hover:border-indigo-500/50 cursor-pointer transition-all">
                        <input type="radio" name="goal"
                            class="w-5 h-5 text-indigo-500 bg-black/50 border-white/20 focus:ring-indigo-500 focus:ring-offset-gray-900" />
                        <div class="ml-4">
                            <span class="block text-white font-medium">Automate daily workflows</span>
                            <span class="block text-gray-500 text-sm mt-0.5">Save time on emails, scheduling, and
                                repetitive tasks.</span>
                        </div>
                        <div class="ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="fa-solid fa-arrow-right text-indigo-400"></i>
                        </div>
                    </label>

                    <!-- Option 2 -->
                    <label
                        class="group flex items-center p-4 rounded-xl border border-indigo-500/50 bg-indigo-500/10 cursor-pointer transition-all shadow-[0_0_15px_rgba(79,70,229,0.15)]">
                        <input type="radio" name="goal" checked
                            class="w-5 h-5 text-indigo-500 bg-black/50 border-white/20 focus:ring-indigo-500 focus:ring-offset-gray-900" />
                        <div class="ml-4">
                            <span class="block text-white font-medium">Build simple applications</span>
                            <span class="block text-gray-500 text-sm mt-0.5">Create internal tools or prototypes without
                                deep coding.</span>
                        </div>
                        <div class="ml-auto">
                            <i class="fa-solid fa-check-circle text-indigo-400"></i>
                        </div>
                    </label>

                    <!-- Option 3 -->
                    <label
                        class="group flex items-center p-4 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 hover:border-indigo-500/50 cursor-pointer transition-all">
                        <input type="radio" name="goal"
                            class="w-5 h-5 text-indigo-500 bg-black/50 border-white/20 focus:ring-indigo-500 focus:ring-offset-gray-900" />
                        <div class="ml-4">
                            <span class="block text-white font-medium">Data analysis & visualization</span>
                            <span class="block text-gray-500 text-sm mt-0.5">Use AI to crunch numbers and generate
                                insights.</span>
                        </div>
                        <div class="ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="fa-solid fa-arrow-right text-indigo-400"></i>
                        </div>
                    </label>
                </div>
            </div>

            <div class="flex justify-between items-center pt-6 border-t border-white/10">
                <button class="text-gray-400 hover:text-white transition-colors text-sm font-medium"><i
                        class="fa-solid fa-arrow-left mr-2"></i> Back</button>
                <a href="/onboarding/" class="btn btn-primary px-8">Continue <i
                        class="fa-solid fa-arrow-right ml-2"></i></a>
            </div>
        </div>
    </div>
</body>

</html>
